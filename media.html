<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Media - Nexus</title>
    <link rel="stylesheet" href="style.css?v=50">
    <link rel="prefetch" href="index.html">
    <link rel="prefetch" href="cookie-engine.js">
    <link rel="prefetch" href="cookie-core.js">
    <style>
        body.media-bg {
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        .media-sticky-stack {
            position: sticky;
            top: 0;
            z-index: 250;
            background: var(--panel-bg-alt);
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
        }

        .media-sticky-stack header { position: relative; margin: 0; border-bottom: none; }

        .media-search-row {
            padding: 10px 20px 14px;
            display: flex;
            justify-content: center;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.12) 0%, transparent 100%);
        }

        .media-container { padding: 16px 24px 48px; max-width: 1680px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .search-area { display: flex; justify-content: center; width: 100%; max-width: 720px; margin: 0 auto; }

        .media-search {
            width: 100%; max-width: 640px; padding: 15px 25px; font-size: 18px; border-radius: 30px;
            border: 2px solid #9C27B0; background: rgba(26, 26, 26, 0.92); color: #fff; outline: none;
            backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: border-color 0.3s;
        }
        .media-search:focus { border-color: #D083DE; }

        .media-section { margin-bottom: 36px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-right: 8px; flex-wrap: wrap; gap: 8px; }
        .section-title { font-size: 22px; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); padding-left: 10px; border-left: 4px solid #9C27B0; }
        
        .media-row { display: flex; gap: 16px; padding: 16px 0 8px; flex-wrap: wrap; align-items: stretch; justify-content: center; }

        .media-card {
            flex: 0 0 auto; width: 160px; height: 240px; position: relative; border-radius: 12px; overflow: hidden;
            cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
            background: #1a1a1a; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .poster-img { width: 100%; height: 100%; object-fit: cover; transition: filter 0.4s; display: block; }
        .poster-img.is-fallback { padding: 14px; object-fit: contain; background: linear-gradient(145deg, #202020, #343434); }
        .media-card:hover { transform: scale(1.06); z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .media-card:hover .poster-img { filter: brightness(0.4) blur(4px); }

        .media-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            opacity: 0; transition: opacity 0.3s; padding: 12px; text-align: center; color: #fff; 
            z-index: 2; pointer-events: none;
        }
        .media-card:hover .media-overlay { opacity: 1; }

        .media-date { position: absolute; top: 12px; left: 0; width: 100%; font-size: 11px; font-weight: bold; opacity: 0.9; margin: 0; }
        .media-title { position: absolute; bottom: 12px; left: 0; width: 100%; font-weight: bold; font-size: 13px; line-height: 1.2; padding: 0 8px; box-sizing: border-box; margin: 0; }
        .play-icon { width: 55px; height: 55px; margin: 0; filter: drop-shadow(0 0 10px rgba(156, 39, 176, 0.8)); }

        .fav-btn {
            position: absolute; top: 8px; right: 8px; z-index: 5; font-size: 24px; color: rgba(255, 255, 255, 0.3);
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); transition: all 0.2s; pointer-events: auto; line-height: 1;
        }
        .fav-btn:hover { transform: scale(1.2); color: rgba(255, 255, 255, 0.8); }
        .fav-btn.active { color: #FFD700 !important; text-shadow: 0 0 8px rgba(255, 215, 0, 0.6) !important; opacity: 1 !important; }

        .show-all-btn {
            flex: 0 0 auto; width: 160px; min-height: 240px; height: auto; align-self: stretch; background: rgba(90, 90, 96, 0.34);
            border: 2px dashed #6e6e75; border-radius: 12px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: #fff; font-weight: bold; cursor: pointer; transition: all 0.3s; gap: 8px; text-align: center; padding: 12px; box-sizing: border-box;
        }
        .show-all-btn:hover { background: rgba(115, 115, 122, 0.54); transform: scale(1.03); }

        #grid-panel { display: none; width: 100%; }
        #grid-panel.active { display: block; }
        .grid-view-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; padding: 4px 4px 0; }
        .grid-view-title { font-size: 26px; font-weight: 800; color: #fff; text-shadow: 2px 2px 6px rgba(0,0,0,0.55); border-left: 4px solid #9C27B0; padding-left: 12px; }
        .grid-meta { font-size: 13px; color: #bbb; font-weight: 600; }
        
        .grid-view { display: grid; width: 100%; box-sizing: border-box; grid-template-columns: repeat(auto-fill, 160px); justify-content: center; gap: 18px 16px; padding: 8px 0 32px; align-items: start; }
        .grid-view .media-card { width: 100%; aspect-ratio: 2 / 3; height: auto; }

        .loading-spinner { display: inline-block; width: 50px; height: 50px; border: 3px solid rgba(156, 39, 176, 0.3); border-radius: 50%; border-top-color: #9C27B0; animation: spin 1s ease-in-out infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-wrap { grid-column: 1 / -1; width: 100%; display: flex; justify-content: center; padding: 48px 0; }
        
        .back-btn { margin-bottom: 16px; color: #d8d8d8; cursor: pointer; font-weight: bold; display: none !important; align-items: center; gap: 8px; font-size: 15px; user-select: none; }
        .back-btn.visible { display: inline-flex !important; }
        .back-icon { width: 22px; height: 22px; display: block; }
        .media-home-back { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background-color: #3d3d3d; border: none; }
        .media-home-back img { width: 22px; height: 22px; display: block; }
        .search-hint { text-align: center; font-size: 12px; color: #888; margin-top: 4px; margin-bottom: 16px; }
    </style>
</head>
<body class="media-bg chat-bg">
    <div class="media-sticky-stack">
        <header>
            <h1 onclick="location.href='index.html'">Nexus Movies & TV</h1>
            <div class="controls">
                <button onclick="location.href='index.html'" class="save-btn material-nav-btn" style="--expanded-width: 110px;">
                    <img src="Assets/media-back-arrow.svg" alt=""><span>Back</span>
                </button>
            </div>
        </header>
        <div class="media-search-row">
            <div class="search-area">
                <input type="text" class="media-search" id="media-search" placeholder="Search for Movies and TV..." autocomplete="off">
            </div>
        </div>
    </div>

    <div class="media-container">
        <button id="back-btn" class="back-btn material-nav-btn" style="--expanded-width: 180px; display: none;">
            <img src="Assets/media-back-arrow.svg" alt=""><span>Back to browse</span>
        </button>

        <div id="browse-view">
            <div id="favorites-section" class="media-section" style="display: none;">
                <div class="section-header">
                    <div class="section-title" style="border-left-color: #FFD700;">My Favorites</div>
                </div>
                <div class="media-row" id="row-favorites"></div>
            </div>
            <div id="categories-container"></div>
        </div>

        <div id="grid-panel">
            <div class="grid-view-header">
                <div class="grid-view-title" id="grid-view-title">Browse</div>
                <div class="grid-meta" id="grid-meta"></div>
            </div>
            <div id="grid-view" class="grid-view"></div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '1a7373301961d03f97f853a876dd1212';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';

        // --- FAVORITES LOGIC ---
        function getFavorites() {
            return JSON.parse(localStorage.getItem('tb_favs') || '[]');
        }

        function toggleFavorite(e, item) {
            e.stopPropagation();
            let favs = getFavorites();
            const index = favs.findIndex(f => String(f.id) === String(item.id));

            if (index > -1) {
                favs.splice(index, 1);
            } else {
                favs.push(item);
            }
            
            localStorage.setItem('tb_favs', JSON.stringify(favs));
            renderFavoritesRow();

            document.querySelectorAll(`.media-card[data-id="${item.id}"] .fav-btn`).forEach(btn => {
                btn.classList.toggle('active', index === -1);
            });
        }

        function renderFavoritesRow() {
            const favs = getFavorites();
            const sec = document.getElementById('favorites-section');
            const row = document.getElementById('row-favorites');
            row.innerHTML = '';
            
            if (favs.length === 0) {
                sec.style.display = 'none';
                return;
            }
            
            sec.style.display = 'block';
            favs.forEach(item => {
                const c = createCard(item);
                if (c) row.appendChild(c);
            });
        }

        // --- TMDB API LOGIC ---
        function buildTMDBUrl(endpoint, extraParams) {
            const q = endpoint.indexOf('?');
            const path = q === -1 ? endpoint : endpoint.slice(0, q);
            const params = new URLSearchParams(q === -1 ? '' : endpoint.slice(q + 1));
            params.set('api_key', TMDB_API_KEY);
            if (extraParams) {
                Object.keys(extraParams).forEach((k) => {
                    if (extraParams[k] !== undefined && extraParams[k] !== null) params.set(k, String(extraParams[k]));
                });
            }
            return 'https://api.themoviedb.org/3/' + path + '?' + params.toString();
        }

        async function fetchTMDB(endpoint, extraParams) {
            const response = await fetch(buildTMDBUrl(endpoint, extraParams));
            if (!response.ok) throw new Error(response.status + ' ' + response.statusText);
            return response.json();
        }

        function inferMediaType(item) {
            if (item.media_type === 'movie' || item.media_type === 'tv' || item.media_type === 'person') return item.media_type;
            if (item.title) return 'movie';
            if (item.name) return 'tv';
            return 'unknown';
        }

        function dedupeResults(list) {
            const seen = new Set();
            return list.filter((item) => {
                const t = inferMediaType(item);
                if (t !== 'movie' && t !== 'tv') return false;
                const key = t + ':' + item.id;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, (ch) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[ch]));
        }

        function posterFallbackDataUrl(title) {
            const safeTitle = escapeHtml(title || 'No Poster');
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 750">
                <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#242424"/><stop offset="1" stop-color="#4a4a4a"/></linearGradient></defs>
                <rect width="500" height="750" fill="url(#g)"/>
                <rect x="34" y="34" width="432" height="682" rx="22" fill="none" stroke="#777" stroke-width="4" opacity=".55"/>
                <text x="250" y="340" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Nexus</text>
                <text x="250" y="392" text-anchor="middle" fill="#cfcfcf" font-family="Arial, sans-serif" font-size="24">Poster unavailable</text>
                <text x="250" y="456" text-anchor="middle" fill="#e7e7e7" font-family="Arial, sans-serif" font-size="24">${safeTitle.slice(0, 28)}</text>
            </svg>`;
            return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
        }

        function getPosterSources(item, title) {
            if (!item.poster_path) return [posterFallbackDataUrl(title)];
            return [
                'https://image.tmdb.org/t/p/w500' + item.poster_path,
                'https://image.tmdb.org/t/p/w780' + item.poster_path,
                'https://image.tmdb.org/t/p/original' + item.poster_path,
                posterFallbackDataUrl(title)
            ];
        }

        function wirePosterFallback(img, sources) {
            img.dataset.posterIndex = '0';
            img.onerror = () => {
                const nextIndex = Number(img.dataset.posterIndex || '0') + 1;
                if (nextIndex >= sources.length) return;
                img.dataset.posterIndex = String(nextIndex);
                if (sources[nextIndex].startsWith('data:')) img.classList.add('is-fallback');
                img.src = sources[nextIndex];
            };
        }

        function createCard(item) {
            const mediaType = inferMediaType(item);
            if (mediaType !== 'movie' && mediaType !== 'tv') return null;

            const card = document.createElement('div');
            card.className = 'media-card';
            card.setAttribute('data-id', item.id);
            
            const title = item.title || item.name || 'Untitled';
            const date = item.release_date || item.first_air_date || '';
            const year = (date && date.split('-')[0]) || '—';
            const posterSources = getPosterSources(item, title);
            
            const isFav = getFavorites().some(f => String(f.id) === String(item.id));

            card.innerHTML = `
                <div class="fav-btn ${isFav ? 'active' : ''}" title="Toggle Favorite">★</div>
                <img src="${posterSources[0]}" class="poster-img${posterSources[0].startsWith('data:') ? ' is-fallback' : ''}" alt="${escapeHtml(title)}">
                <div class="media-overlay">
                    <div class="media-date">${year}</div>
                    <img src="Assets/mediaP.png" class="play-icon" alt="Play">
                    <div class="media-title">${escapeHtml(title)}</div>
                </div>
            `;
            
            wirePosterFallback(card.querySelector('.poster-img'), posterSources);
            card.querySelector('.fav-btn').onclick = (e) => toggleFavorite(e, item);
            card.onclick = () => openPlayer(item, mediaType);
            return card;
        }

        function createShowAllBtn(endpoint, title) {
            const btn = document.createElement('div');
            btn.className = 'show-all-btn';
            btn.innerHTML = '<span style="font-size:28px;line-height:1;">+</span><span>Show All</span>';
            btn.setAttribute('role', 'button');
            btn.tabIndex = 0;
            btn.onclick = () => showGrid(endpoint, title);
            btn.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showGrid(endpoint, title); } };
            return btn;
        }

        const BROWSE_SECTIONS = [
            { id: 'row-trending-week', title: 'Trending This Week', endpoint: 'trending/all/week', preview: 6 },
            { id: 'row-trending-day', title: 'Trending Today', endpoint: 'trending/all/day', preview: 6 },
            { id: 'row-popular-movies', title: 'Popular Movies', endpoint: 'movie/popular', preview: 6 },
            { id: 'row-top-rated-movies', title: 'Top Rated Movies', endpoint: 'movie/top_rated', preview: 6 },
            { id: 'row-now-playing', title: 'Now Playing (Theaters)', endpoint: 'movie/now_playing', preview: 6 },
            { id: 'row-upcoming', title: 'Upcoming Movies', endpoint: 'movie/upcoming', preview: 6 },
            { id: 'row-popular-tv', title: 'Popular TV', endpoint: 'tv/popular', preview: 6 },
            { id: 'row-top-tv', title: 'Top Rated TV', endpoint: 'tv/top_rated', preview: 6 },
            { id: 'row-on-air', title: 'TV On The Air', endpoint: 'tv/on_the_air', preview: 6 },
            { id: 'row-airing-today', title: 'TV Airing Today', endpoint: 'tv/airing_today', preview: 6 },
            { id: 'row-action', title: 'Action', endpoint: 'discover/movie?with_genres=28&sort_by=popularity.desc', preview: 6 },
            { id: 'row-comedy', title: 'Comedy', endpoint: 'discover/movie?with_genres=35&sort_by=popularity.desc', preview: 6 },
            { id: 'row-animation', title: 'Animation', endpoint: 'discover/movie?with_genres=16&sort_by=popularity.desc', preview: 6 },
            { id: 'row-scifi', title: 'Sci‑Fi', endpoint: 'discover/movie?with_genres=878&sort_by=popularity.desc', preview: 6 },
            { id: 'row-horror', title: 'Horror', endpoint: 'discover/movie?with_genres=27&sort_by=popularity.desc', preview: 6 },
            { id: 'row-doc', title: 'Documentaries', endpoint: 'discover/movie?with_genres=99&sort_by=popularity.desc', preview: 6 },
            { id: 'row-romance', title: 'Romance', endpoint: 'discover/movie?with_genres=10749&sort_by=popularity.desc', preview: 6 },
            { id: 'row-fantasy', title: 'Fantasy', endpoint: 'discover/movie?with_genres=14&sort_by=popularity.desc', preview: 6 },
            { id: 'row-crime-tv', title: 'Crime TV', endpoint: 'discover/tv?with_genres=80&sort_by=popularity.desc', preview: 6 },
            { id: 'row-animation-tv', title: 'Animation TV', endpoint: 'discover/tv?with_genres=16&sort_by=popularity.desc', preview: 6 },
            { id: 'row-reality', title: 'Reality TV', endpoint: 'discover/tv?with_genres=10764&sort_by=popularity.desc', preview: 6 },
            { id: 'row-mystery', title: 'Mystery', endpoint: 'discover/movie?with_genres=9648&sort_by=popularity.desc', preview: 6 },
            { id: 'row-family', title: 'Family', endpoint: 'discover/movie?with_genres=10751&sort_by=popularity.desc', preview: 6 }
        ];

        function buildBrowseDOM() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            BROWSE_SECTIONS.forEach((sec) => {
                const wrap = document.createElement('div');
                wrap.className = 'media-section';
                wrap.id = 'sec-' + sec.id;
                wrap.innerHTML = `<div class="section-header"><div class="section-title">${sec.title}</div></div>
                                  <div class="media-row" id="${sec.id}"><div class="loading-wrap"><div class="loading-spinner"></div></div></div>`;
                container.appendChild(wrap);
            });
        }

        async function init() {
            renderFavoritesRow();
            buildBrowseDOM();
            for (const s of BROWSE_SECTIONS) {
                const row = document.getElementById(s.id);
                if (!row) continue;
                try {
                    const data = await fetchTMDB(s.endpoint, { page: 1 });
                    row.innerHTML = '';
                    const slice = (data.results || []).filter((it) => inferMediaType(it) === 'movie' || inferMediaType(it) === 'tv').slice(0, s.preview);
                    slice.forEach((item) => {
                        const c = createCard(item);
                        if (c) row.appendChild(c);
                    });
                    row.appendChild(createShowAllBtn(s.endpoint, s.title));
                } catch (err) {
                    row.innerHTML = '<div style="color:#f44336;padding:12px;">Failed to load: ' + s.title + '</div>';
                }
            }
        }

        async function collectPagedResults(endpoint, maxPages) {
            const merged = [];
            for (let page = 1; page <= maxPages; page++) {
                const data = await fetchTMDB(endpoint, { page });
                if (!data || !data.results || !data.results.length) break;
                merged.push.apply(merged, data.results);
                const totalPages = data.total_pages || 1;
                if (page >= totalPages) break;
            }
            return merged;
        }

        async function showGrid(endpoint, title, options) {
            const opts = options || {};
            const maxPages = opts.maxPages != null ? opts.maxPages : 8;
            const isSearch = endpoint.indexOf('search/multi') === 0;

            const browseView = document.getElementById('browse-view');
            const gridPanel = document.getElementById('grid-panel');
            const gridView = document.getElementById('grid-view');
            const backBtn = document.getElementById('back-btn');
            const searchHint = document.getElementById('search-hint');

            browseView.style.display = 'none';
            gridPanel.classList.add('active');
            backBtn.classList.add('visible');
            if (searchHint) searchHint.style.display = 'none';

            document.getElementById('grid-view-title').textContent = title || 'Browse';
            document.getElementById('grid-meta').textContent = 'Loading…';

            gridView.innerHTML = '<div class="loading-wrap"><div class="loading-spinner"></div></div>';

            try {
                let results;
                if (isSearch) {
                    const first = await fetchTMDB(endpoint, { page: 1 });
                    const totalPages = Math.min(first.total_pages || 1, maxPages);
                    results = dedupeResults(first.results || []);
                    for (let page = 2; page <= totalPages; page++) {
                        const data = await fetchTMDB(endpoint, { page });
                        results = dedupeResults(results.concat(data.results || []));
                    }
                } else {
                    results = await collectPagedResults(endpoint, maxPages);
                    results = dedupeResults(results);
                }

                gridView.innerHTML = '';
                const playable = results.filter((it) => {
                    const t = inferMediaType(it);
                    return t === 'movie' || t === 'tv';
                });

                playable.forEach((item) => {
                    const c = createCard(item);
                    if (c) gridView.appendChild(c);
                });

                document.getElementById('grid-meta').textContent = playable.length + ' titles · multi-page where available';
                if (!playable.length) {
                    gridView.innerHTML = '<div class="loading-wrap" style="color:#aaa;font-weight:bold;">No results.</div>';
                    document.getElementById('grid-meta').textContent = '';
                }
            } catch (e) {
                gridView.innerHTML = '<div class="loading-wrap" style="color:#f44336;font-weight:bold;">Error: ' + (e.message || String(e)) + '</div>';
                document.getElementById('grid-meta').textContent = '';
            }
            window.scrollTo(0, 0);
        }

        function resetView() {
            document.getElementById('browse-view').style.display = 'block';
            document.getElementById('grid-panel').classList.remove('active');
            document.getElementById('back-btn').classList.remove('visible');
            document.getElementById('grid-view').innerHTML = '';
            const searchHint = document.getElementById('search-hint');
            if (searchHint) searchHint.style.display = '';
            renderFavoritesRow();
        }

        document.getElementById('back-btn').onclick = resetView;

        const searchInput = document.getElementById('media-search');
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length < 2) {
                resetView();
                return;
            }
            searchTimeout = setTimeout(() => {
                showGrid('search/multi?query=' + encodeURIComponent(query), 'Search: “' + query + '”', { maxPages: 5 });
            }, 450);
        });

        // --- PLAYER LOGIC ---
        function mediaProgressKey(type, id) {
            return 'tb_media_progress_' + type + '_' + id;
        }

        function getSavedMediaProgress(type, id) {
            try {
                return JSON.parse(localStorage.getItem(mediaProgressKey(type, id)) || 'null') || {};
            } catch (e) {
                return {};
            }
        }

        async function openPlayer(item, type) {
            const id = item.id;
            const title = item.title || item.name;
            const savedProgress = getSavedMediaProgress(type, id);
            let firstSeasonNum = 1;
            let seasonsData = [];
            
            if (type === 'tv') {
                try {
                    const tvInfo = await fetchTMDB('tv/' + id);
                    const seasons = (tvInfo.seasons || []).filter((s) => s.season_number > 0);
                    const savedSeason = Number(savedProgress.season);
                    const pick = seasons.find((s) => s.season_number === savedSeason && (s.episode_count || 0) > 0)
                        || seasons.find((s) => (s.episode_count || 0) > 0)
                        || seasons[0];
                    if (pick && typeof pick.season_number === 'number') firstSeasonNum = pick.season_number;
                    const sn = await fetchTMDB('tv/' + id + '/season/' + firstSeasonNum);
                    seasonsData = sn.episodes || [];
                } catch (e) { seasonsData = []; }
            }

            const win = window.open('about:blank', '_blank');
            if (!win) return alert('Pop-up blocked!');

            // Set dark background immediately to prevent white flash
            try {
                win.document.documentElement.style.background = '#0a0a0a';
                if (win.document.body) win.document.body.style.background = '#0a0a0a';
            } catch (e) {}

            const safeTitle = String(title).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
            const epJson = JSON.stringify(seasonsData).replace(/</g, '\\u003c');
            const savedProgressJson = JSON.stringify(savedProgress).replace(/</g, '\\u003c');
            const backIconUrl = new URL('Assets/media-back-arrow.svg', location.href).href;

            const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${safeTitle} - Nexus Player</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html { height: 100%; }
  body { margin: 0; height: 100vh; overflow: hidden; background: #0a0a0a; color: #fff; font-family: 'Space Grotesk', sans-serif; }
  #main-row { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
  
  /* Sidebar styles */
  #sidebar { position: fixed; top: 78px; left: 18px; bottom: 22px; width: min(340px, calc(100vw - 36px)); min-width: 0; background: rgba(20, 20, 20, 0.92); border: 1px solid rgba(255,255,255,0.14); border-radius: 14px; display: flex; flex-direction: column; transition: transform 0.24s ease, opacity 0.2s ease; z-index: 240; box-shadow: 0 18px 60px rgba(0,0,0,0.58); backdrop-filter: blur(14px); overflow: hidden; }
  body.sidebar-collapsed #sidebar { transform: translateY(-10px) scale(0.96); transform-origin: top left; opacity: 0; pointer-events: none; }
  body.movie-mode #sidebar { display: none; }
  body.movie-mode #peek-open { display: none; }
  
  .sb-head { display: flex; align-items: center; justify-content: flex-start; padding: 14px 16px; border-bottom: 1px solid #333; position: sticky; top: 0; background: rgba(20,20,20,0.96); z-index: 5; font-weight: 700; }
  
  #episode-wrap { flex: 1; overflow-y: auto; }
  body.movie-mode #episode-wrap { display: none !important; }
  .episode { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
  .episode:hover { background: #222; }
  .episode.active { background: #55555c; font-weight: 700; }
  .episode-num { color: #9e9e9e; font-size: 11px; margin-bottom: 4px; font-weight: 600; }

  #player-container { position: absolute; inset: 0; background: #000; }
  #main-player { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background-color: #0a0a0a; background: #0a0a0a; }
  
  /* The popup overlay buttons */
  #hover-catcher {
      position: fixed; left: 0; top: 0; width: 150px; height: 86px;
      z-index: 255; display: block; pointer-events: auto; background: transparent;
  }
  body.movie-mode #hover-catcher { width: 94px; }

  #peek-zone { 
      position: fixed; left: 16px; top: 16px; z-index: 260;
      display: flex; align-items: center; justify-content: center; 
      padding: 0; pointer-events: none;
      transition: opacity 0.5s ease; opacity: 1;
  }
  .peek-zone-hidden { opacity: 0 !important; pointer-events: none !important; }

  .peek-stack { display: flex; flex-direction: row; gap: 10px; pointer-events: auto; margin-top: 0; padding: 8px; border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; background: rgba(15,15,15,0.62); box-shadow: 0 12px 34px rgba(0,0,0,0.45); backdrop-filter: blur(12px); }
  .peek-ico-btn { 
      opacity: 0.85; transition: opacity 0.2s, transform 0.2s; 
      border: none; background: #56565d; color: #fff; 
      width: 46px; height: 42px; border-radius: 999px; 
      cursor: pointer; font-size: 20px; font-weight: bold; 
      box-shadow: 0 6px 18px rgba(0,0,0,0.34);
      display: flex; align-items: center; justify-content: center;
  }
  .peek-ico-btn:hover { opacity: 1; transform: translateY(-1px); background: #73737a; }
  .peek-ico-btn img { width: 30px; height: 30px; display: block; pointer-events: none; }
  @media (max-width: 640px) { #sidebar { top: 72px; left: 10px; bottom: 12px; width: calc(100vw - 20px); } #peek-zone { left: 10px; top: 10px; } #hover-catcher { width: 142px; height: 78px; } body.movie-mode #hover-catcher { width: 86px; } }
</style>
</head>
<body class="${type === 'tv' ? 'tv-mode sidebar-collapsed' : 'movie-mode sidebar-collapsed'}">

<!-- Catches mouse movements to unhide buttons without blocking the iframe -->
<div id="hover-catcher"></div>

<div id="peek-zone">
  <div class="peek-stack">
    <button type="button" class="peek-ico-btn" id="btn-back" title="Close Player"><img src="${backIconUrl}" alt=""></button>
    <button type="button" class="peek-ico-btn" id="peek-open" title="Show Sidebar">☰</button>
  </div>
</div>

<div id="main-row">
  <div id="player-container">
    <iframe id="main-player" style="background-color: #0a0a0a; background: #0a0a0a;" allowtransparency="true" allowfullscreen allow="autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe>
  </div>
  <aside id="sidebar">
    <div class="sb-head">
      <span id="sb-title">${type === 'tv' ? 'Episodes' : 'Player'}</span>
    </div>
    
    <div id="episode-wrap"><div id="episode-list"></div></div>
  </aside>
</div>

<script>
(function(){
  const id = ${JSON.stringify(String(id))};
  const type = ${JSON.stringify(type)};
  const episodes = ${epJson};
  const savedProgress = ${savedProgressJson};
  const mediaTitle = ${JSON.stringify(title || 'Untitled')};
  const progressKey = 'tb_media_progress_' + type + '_' + id;
  let currentS = ${firstSeasonNum};
  let currentE = 1;
  let progressSeconds = Number(savedProgress.seconds) || 0;
  let progressDuration = Number(savedProgress.duration) || 0;

  const PREF_SOURCE_KEY = 'tb_media_source';
  const OLD_PREF_SOURCE_KEY = 'tb_default_server';
  const PREF_AUTO_KEY = 'tb_media_auto_choose';
  const PREF_SHIELD_KEY = 'tb_media_remove_shield';

  let userWantsToLeave = false;
  let removeShieldUnsafe = false;
  const originalWindowOpen = window.open ? window.open.bind(window) : null;

  window.open = function() {
    if (removeShieldUnsafe && originalWindowOpen) return originalWindowOpen.apply(window, arguments);
    try {
      return new Proxy({}, {
        get: function(target, prop) {
          if (prop === 'closed') return false;
          if (prop === 'document') {
            return new Proxy({}, {
              get: function(t, p) {
                if (p === 'write' || p === 'open' || p === 'close') return function() {};
                return {};
              }
            });
          }
          if (prop === 'location') return {};
          return function() {};
        },
        set: function() { return true; }
      });
    } catch (e) {
      return null;
    }
  };

  // Native sandboxing handles top navigation blocks natively, bypassing the need for a beforeunload trap.

  function saveProgress(extra) {
    var payload = {
      id: id,
      type: type,
      title: mediaTitle,
      season: type === 'tv' ? currentS : null,
      episode: type === 'tv' ? currentE : null,
      seconds: Math.max(0, Number(progressSeconds) || 0),
      duration: Math.max(0, Number(progressDuration) || 0),
      updatedAt: Date.now()
    };
    if (extra) Object.assign(payload, extra);
    try { localStorage.setItem(progressKey, JSON.stringify(payload)); } catch (e) {}
  }

  function parseMaybeJson(value) {
    if (typeof value !== 'string') return value;
    try { return JSON.parse(value); } catch (e) { return value; }
  }

  function readNumericField(value, keys, depth) {
    try {
      if (!value || depth > 4) return null;
      if (typeof value === 'number' && Number.isFinite(value)) return value;
      if (typeof value !== 'object') return null;
      for (var i = 0; i < keys.length; i++) {
        var direct = Number(value[keys[i]]);
        if (Number.isFinite(direct) && direct >= 0) return direct;
      }
      var names = Object.keys(value);
      for (var j = 0; j < names.length; j++) {
        var found = readNumericField(parseMaybeJson(value[names[j]]), keys, depth + 1);
        if (found !== null) return found;
      }
    } catch (e) {
      // Ignore potential cross-origin or security restricted property access errors
    }
    return null;
  }

  window.addEventListener('message', function(event) {
    var data = parseMaybeJson(event.data);
    var seconds = readNumericField(data, ['currentTime', 'current_time', 'time', 'seconds', 'position', 'playedSeconds'], 0);
    var duration = readNumericField(data, ['duration', 'totalDuration', 'total_duration'], 0);
    if (seconds !== null) progressSeconds = seconds;
    if (duration !== null) progressDuration = duration;
    if (seconds !== null || duration !== null) saveProgress();
  });

  window.addEventListener('pagehide', function() { saveProgress(); });
  window.addEventListener('beforeunload', function() { saveProgress(); });
  setInterval(saveProgress, 10000);

  const PROVIDERS = [
    { id: 'cinemaos', name: 'CinemaOS', quality: 98, captions: 92, reliability: 98, popupRisk: 10,
      movie: function(sid) { return 'https://cinemaos.live/player/' + sid + '?title=false'; },
      tv: function(sid, s, e) { return 'https://cinemaos.live/player/' + sid + '/' + s + '/' + e; } },
    { id: 'vidlink', name: 'VidLink', quality: 96, captions: 92, reliability: 92, popupRisk: 16,
      movie: function(sid) { return 'https://vidlink.pro/movie/' + sid + '?primaryColor=a244b2&autoplay=1'; },
      tv: function(sid, s, e) { return 'https://vidlink.pro/tv/' + sid + '/' + s + '/' + e + '?primaryColor=a244b2&autoplay=1'; } },
    { id: 'ezvidapi', name: 'EZVidAPI', quality: 85, captions: 80, reliability: 76, popupRisk: 22,
      movie: function(sid) { return 'https://ezvidapi.com/embed/movie/' + sid; },
      tv: function(sid, s, e) { return 'https://ezvidapi.com/embed/tv/' + sid + '/' + s + '/' + e; } },
    { id: 'ztstream', name: 'ZTStream', quality: 85, captions: 76, reliability: 78, popupRisk: 22,
      movie: function(sid) { return 'https://ztstream.eu/embed/movie/' + sid; },
      tv: function(sid, s, e) { return 'https://ztstream.eu/embed/tv/' + sid + '/' + s + '/' + e; } },
    { id: 'autoembed', name: 'AutoEmbed', quality: 80, captions: 66, reliability: 72, popupRisk: 36,
      movie: function(sid) { return 'https://autoembed.co/movie/tmdb/' + sid; },
      tv: function(sid, s, e) { return 'https://autoembed.co/tv/tmdb/' + sid + '-' + s + '-' + e; } },
    { id: 'twoembed', name: '2Embed', quality: 68, captions: 48, reliability: 62, popupRisk: 64,
      movie: function(sid) { return 'https://www.2embed.cc/embed/' + sid; },
      tv: function(sid, s, e) { return 'https://www.2embed.cc/embedtv/' + sid + '?s=' + s + '&e=' + e; } }
  ];

  let manualLoader = '';
  let autoChoose = true;

  function readMediaPreferences() {
    manualLoader = localStorage.getItem(PREF_SOURCE_KEY) || localStorage.getItem(OLD_PREF_SOURCE_KEY) || 'cinemaos';
    autoChoose = localStorage.getItem(PREF_AUTO_KEY) !== 'false';
    removeShieldUnsafe = localStorage.getItem(PREF_SHIELD_KEY) === 'true';
  }

  readMediaPreferences();

  function supportsProvider(provider) {
    return provider && typeof provider[type] === 'function';
  }
  function providerScore(provider) {
    return (provider.quality * 5) + (provider.captions * 4) + (provider.reliability * 2) - (provider.popupRisk * 1.25);
  }

  function findProvider(providerId) {
    return PROVIDERS.find(function(provider) {
      return provider.id === providerId && supportsProvider(provider);
    });
  }

  function chooseBestProvider() {
    var options = PROVIDERS.filter(supportsProvider).slice();
    options.sort(function(a, b) {
      return providerScore(b) - providerScore(a);
    });
    return options[0] || PROVIDERS[0];
  }

  function getEffectiveProvider() {
    if (autoChoose) return chooseBestProvider();
    return findProvider(manualLoader) || chooseBestProvider();
  }

  function embedUrl() {
    var provider = getEffectiveProvider();
    var sid = encodeURIComponent(id);
    var s = encodeURIComponent(String(currentS));
    var e = encodeURIComponent(String(currentE));
    return provider[type](sid, s, e);
  }

  function updatePlayer() {
    var frame = document.getElementById('main-player');
    if (!frame) return;
    saveProgress();
    
    if (removeShieldUnsafe) {
      frame.removeAttribute('sandbox');
    } else {
      frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-presentation');
    }
    
    frame.src = 'about:blank';
    setTimeout(function() {
      frame.src = embedUrl();
    }, 20);
  }

  window.addEventListener('storage', function(e) {
    if ([PREF_SOURCE_KEY, OLD_PREF_SOURCE_KEY, PREF_AUTO_KEY, PREF_SHIELD_KEY].indexOf(e.key) === -1) return;
    readMediaPreferences();
    updatePlayer();
  });

  function renderEpisodes() {
    var list = document.getElementById('episode-list');
    if (!list) return;
    list.innerHTML = '';
    episodes.forEach(function(ep) {
      var div = document.createElement('div');
      div.className = 'episode' + (ep.episode_number === currentE ? ' active' : '');
      div.innerHTML = '<div class="episode-num">E' + ep.episode_number + '</div>' + (ep.name || '');
      div.addEventListener('click', function() {
        currentE = ep.episode_number;
        progressSeconds = 0;
        progressDuration = 0;
        saveProgress();
        updatePlayer();
        renderEpisodes();
      });
      list.appendChild(div);
    });
  }

  // Fade Out Logic for peek buttons
  let hideTimer;
  const peekZone = document.getElementById('peek-zone');
  const hoverCatcher = document.getElementById('hover-catcher');

  function resetFade() {
      peekZone.classList.remove('peek-zone-hidden');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
          peekZone.classList.add('peek-zone-hidden');
      }, 3000);
  }

  document.addEventListener('mousemove', resetFade);
  if (hoverCatcher) {
    hoverCatcher.addEventListener('mouseenter', resetFade);
    hoverCatcher.addEventListener('mousemove', resetFade);
  }
  if (peekZone) peekZone.addEventListener('mousemove', resetFade);
  resetFade();

  // Sidebar controls logic
  function setCollapsed(on) {
    document.body.classList.toggle('sidebar-collapsed', on);
    if (peekOpenBtn) {
      peekOpenBtn.title = on ? 'Show Sidebar' : 'Hide Sidebar';
      peekOpenBtn.setAttribute('aria-pressed', on ? 'false' : 'true');
    }
  }
  
  const peekOpenBtn = document.getElementById('peek-open');
  if (peekOpenBtn) {
    peekOpenBtn.addEventListener('click', () => setCollapsed(!document.body.classList.contains('sidebar-collapsed')));
    setCollapsed(document.body.classList.contains('sidebar-collapsed'));
  }

  // Back Button Logic: Disable the redirect trap before closing
  const btnBack = document.getElementById('btn-back');
  if (btnBack) {
      btnBack.addEventListener('click', () => {
          userWantsToLeave = true;
          window.close();
      });
  }

  // Initialization logic
  if (type === 'tv' && episodes.length) {
    var savedEpisode = Number(savedProgress.episode);
    var savedMatch = episodes.find(function(ep) { return ep.episode_number === savedEpisode; });
    currentE = (savedMatch && savedMatch.episode_number) || episodes[0].episode_number || 1;
    renderEpisodes();
  }
  
  updatePlayer();
})();
<\/script>
</body>
</html>`;

            win.document.open();
            win.document.write(html);
            win.document.close();
        }

        init();
    </script>
