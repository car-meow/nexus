<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Media - Toothbrush</title>
    <link rel="stylesheet" href="style.css?v=48">
    <style>
        body.media-bg {
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            background-color: var(--zigzag-bg);
            background-image: linear-gradient(135deg, var(--zigzag-line) 25%, transparent 25%), linear-gradient(225deg, var(--zigzag-line) 25%, transparent 25%), linear-gradient(45deg, var(--zigzag-line) 25%, transparent 25%), linear-gradient(315deg, var(--zigzag-line) 25%, transparent 25%);
            background-position: 40px 0, 40px 0, 0 0, 0 0;
            background-size: 80px 80px;
            animation: moveBackground 40s linear infinite;
        }

        /* Sticky: site header + search stay pinned while scrolling lists */
        .media-sticky-stack {
            position: sticky;
            top: 0;
            z-index: 250;
            background: var(--panel-bg-alt);
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
        }

        .media-sticky-stack header {
            position: relative;
            margin: 0;
            border-bottom: none;
        }

        .media-search-row {
            padding: 10px 20px 14px;
            display: flex;
            justify-content: center;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.12) 0%, transparent 100%);
        }

        .media-container {
            padding: 16px 24px 48px;
            max-width: 1680px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .search-area {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
        }

        .media-search {
            width: 100%;
            max-width: 640px;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 30px;
            border: 2px solid #9C27B0;
            background: rgba(26, 26, 26, 0.92);
            color: #fff;
            outline: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: border-color 0.3s;
        }

        .media-search:focus {
            border-color: #E91E63;
        }

        .media-section {
            margin-bottom: 36px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-right: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            padding-left: 10px;
            border-left: 4px solid #9C27B0;
        }

        .media-row {
            display: flex;
            gap: 16px;
            padding: 16px 4px 8px;
            flex-wrap: wrap;
            align-items: stretch;
            justify-content: flex-start;
        }

        .media-card {
            flex: 0 0 auto;
            width: 160px;
            height: 240px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
            background: #1a1a1a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .media-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.4s;
        }

        .media-card:hover {
            transform: scale(1.06);
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .media-card:hover img {
            filter: brightness(0.4) blur(4px);
        }

        .media-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            padding: 12px;
            text-align: center;
            color: #fff;
            z-index: 2;
        }

        .media-card:hover .media-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 35px;
            height: 35px;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 10px rgba(156, 39, 176, 0.8));
            backface-visibility: hidden;
            -webkit-font-smoothing: subpixel-antialiased;
        }

        .media-title {
            font-weight: bold;
            font-size: 13px;
            margin-top: auto;
            line-height: 1.2;
        }

        .media-date {
            font-size: 10px;
            opacity: 0.85;
            margin-bottom: 4px;
        }

        .show-all-btn {
            flex: 0 0 auto;
            width: 160px;
            min-height: 240px;
            height: auto;
            align-self: stretch;
            background: rgba(156, 39, 176, 0.22);
            border: 2px dashed #9C27B0;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            gap: 8px;
            text-align: center;
            padding: 12px;
            box-sizing: border-box;
        }

        .show-all-btn:hover {
            background: rgba(156, 39, 176, 0.45);
            transform: scale(1.03);
        }

        #grid-panel {
            display: none;
            width: 100%;
        }

        #grid-panel.active {
            display: block;
        }

        .grid-view-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 4px 4px 0;
        }

        .grid-view-title {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.55);
            border-left: 4px solid #E91E63;
            padding-left: 12px;
        }

        .grid-meta {
            font-size: 13px;
            color: #bbb;
            font-weight: 600;
        }

        .grid-view {
            display: grid;
            width: 100%;
            box-sizing: border-box;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 18px 16px;
            padding: 8px 0 32px;
            align-items: start;
        }

        .grid-view .media-card {
            width: 100%;
            aspect-ratio: 2 / 3;
            height: auto;
        }

        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(156, 39, 176, 0.3);
            border-radius: 50%;
            border-top-color: #9C27B0;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-wrap {
            grid-column: 1 / -1;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 48px 0;
        }

        .back-btn {
            margin-bottom: 16px;
            color: #9C27B0;
            cursor: pointer;
            font-weight: bold;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            user-select: none;
        }

        .back-btn.visible {
            display: flex;
        }

        .search-hint {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 4px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body class="media-bg">
    <div class="media-sticky-stack">
        <header>
            <h1 onclick="location.href='index.html'">Toothbrush Movies & TV</h1>
            <div class="controls">
                <button onclick="location.href='index.html'" class="save-btn" style="background-color: #3d3d3d;">Back</button>
            </div>
        </header>
        <div class="media-search-row">
            <div class="search-area">
                <input type="text" class="media-search" id="media-search" placeholder="Search movies, TV, people (results: movies & TV only)..." autocomplete="off">
            </div>
        </div>
    </div>

    <div class="media-container">
        <p class="search-hint" id="search-hint">Tip: clear the box to return to browse. Search uses TMDB multi search.</p>

        <div id="back-btn" class="back-btn">← Back to browse</div>

        <div id="browse-view"></div>

        <div id="grid-panel">
            <div class="grid-view-header">
                <div class="grid-view-title" id="grid-view-title">Browse</div>
                <div class="grid-meta" id="grid-meta"></div>
            </div>
            <div id="grid-view" class="grid-view"></div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '1a7373301961d03f97f853a876dd1212';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';

        /** Build TMDB URL whether endpoint already has query params (fixes search & discover). */
        function buildTMDBUrl(endpoint, extraParams) {
            const q = endpoint.indexOf('?');
            const path = q === -1 ? endpoint : endpoint.slice(0, q);
            const params = new URLSearchParams(q === -1 ? '' : endpoint.slice(q + 1));
            params.set('api_key', TMDB_API_KEY);
            if (extraParams) {
                Object.keys(extraParams).forEach((k) => {
                    if (extraParams[k] !== undefined && extraParams[k] !== null)
                        params.set(k, String(extraParams[k]));
                });
            }
            return 'https://api.themoviedb.org/3/' + path + '?' + params.toString();
        }

        async function fetchTMDB(endpoint, extraParams) {
            const response = await fetch(buildTMDBUrl(endpoint, extraParams));
            if (!response.ok) throw new Error(response.status + ' ' + response.statusText);
            return response.json();
        }

        function inferMediaType(item) {
            if (item.media_type === 'movie' || item.media_type === 'tv' || item.media_type === 'person')
                return item.media_type;
            if (item.title) return 'movie';
            if (item.name) return 'tv';
            return 'unknown';
        }

        /** Dedupe by id + media_type (movies & TV only) */
        function dedupeResults(list) {
            const seen = new Set();
            return list.filter((item) => {
                const t = inferMediaType(item);
                if (t !== 'movie' && t !== 'tv') return false;
                const key = t + ':' + item.id;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        function createCard(item) {
            const mediaType = inferMediaType(item);
            if (mediaType !== 'movie' && mediaType !== 'tv') return null;

            const card = document.createElement('div');
            card.className = 'media-card';
            const title = item.title || item.name || 'Untitled';
            const date = item.release_date || item.first_air_date || '';
            const year = (date && date.split('-')[0]) || '—';
            const poster = item.poster_path ? IMG_URL + item.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster';

            card.innerHTML =
                '<img src="' + poster + '" alt="' + title.replace(/"/g, '&quot;') + '">' +
                '<div class="media-overlay">' +
                '<img src="Assets/mediaP.png" class="play-icon" alt="Play">' +
                '<div class="media-date">' + year + '</div>' +
                '<div class="media-title">' + title + '</div>' +
                '</div>';
            card.onclick = () => openPlayer(item, mediaType);
            return card;
        }

        function createShowAllBtn(endpoint, title) {
            const btn = document.createElement('div');
            btn.className = 'show-all-btn';
            btn.innerHTML = '<span style="font-size:28px;line-height:1;">+</span><span>Show All</span>';
            btn.setAttribute('role', 'button');
            btn.tabIndex = 0;
            btn.onclick = () => showGrid(endpoint, title);
            btn.onkeydown = (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    showGrid(endpoint, title);
                }
            };
            return btn;
        }

        const BROWSE_SECTIONS = [
            { id: 'row-trending-week', title: 'Trending This Week', endpoint: 'trending/all/week', preview: 6 },
            { id: 'row-trending-day', title: 'Trending Today', endpoint: 'trending/all/day', preview: 6 },
            { id: 'row-popular-movies', title: 'Popular Movies', endpoint: 'movie/popular', preview: 6 },
            { id: 'row-top-rated-movies', title: 'Top Rated Movies', endpoint: 'movie/top_rated', preview: 6 },
            { id: 'row-now-playing', title: 'Now Playing (Theaters)', endpoint: 'movie/now_playing', preview: 6 },
            { id: 'row-upcoming', title: 'Upcoming Movies', endpoint: 'movie/upcoming', preview: 6 },
            { id: 'row-popular-tv', title: 'Popular TV', endpoint: 'tv/popular', preview: 6 },
            { id: 'row-top-tv', title: 'Top Rated TV', endpoint: 'tv/top_rated', preview: 6 },
            { id: 'row-on-air', title: 'TV On The Air', endpoint: 'tv/on_the_air', preview: 6 },
            { id: 'row-airing-today', title: 'TV Airing Today', endpoint: 'tv/airing_today', preview: 6 },
            { id: 'row-action', title: 'Action', endpoint: 'discover/movie?with_genres=28&sort_by=popularity.desc', preview: 6 },
            { id: 'row-comedy', title: 'Comedy', endpoint: 'discover/movie?with_genres=35&sort_by=popularity.desc', preview: 6 },
            { id: 'row-animation', title: 'Animation', endpoint: 'discover/movie?with_genres=16&sort_by=popularity.desc', preview: 6 },
            { id: 'row-scifi', title: 'Sci‑Fi', endpoint: 'discover/movie?with_genres=878&sort_by=popularity.desc', preview: 6 },
            { id: 'row-horror', title: 'Horror', endpoint: 'discover/movie?with_genres=27&sort_by=popularity.desc', preview: 6 },
            { id: 'row-doc', title: 'Documentaries', endpoint: 'discover/movie?with_genres=99&sort_by=popularity.desc', preview: 6 },
            { id: 'row-romance', title: 'Romance', endpoint: 'discover/movie?with_genres=10749&sort_by=popularity.desc', preview: 6 },
            { id: 'row-fantasy', title: 'Fantasy', endpoint: 'discover/movie?with_genres=14&sort_by=popularity.desc', preview: 6 },
            { id: 'row-crime-tv', title: 'Crime TV', endpoint: 'discover/tv?with_genres=80&sort_by=popularity.desc', preview: 6 },
            { id: 'row-animation-tv', title: 'Animation TV', endpoint: 'discover/tv?with_genres=16&sort_by=popularity.desc', preview: 6 },
            { id: 'row-reality', title: 'Reality TV', endpoint: 'discover/tv?with_genres=10764&sort_by=popularity.desc', preview: 6 },
            { id: 'row-mystery', title: 'Mystery', endpoint: 'discover/movie?with_genres=9648&sort_by=popularity.desc', preview: 6 },
            { id: 'row-family', title: 'Family', endpoint: 'discover/movie?with_genres=10751&sort_by=popularity.desc', preview: 6 }
        ];

        function buildBrowseDOM() {
            const browse = document.getElementById('browse-view');
            browse.innerHTML = '';
            BROWSE_SECTIONS.forEach((sec) => {
                const wrap = document.createElement('div');
                wrap.className = 'media-section';
                wrap.id = 'sec-' + sec.id;
                wrap.innerHTML =
                    '<div class="section-header">' +
                    '<div class="section-title">' + sec.title + '</div>' +
                    '</div>' +
                    '<div class="media-row" id="' + sec.id + '"><div class="loading-wrap"><div class="loading-spinner"></div></div></div>';
                browse.appendChild(wrap);
            });
        }

        async function init() {
            buildBrowseDOM();
            for (const s of BROWSE_SECTIONS) {
                const row = document.getElementById(s.id);
                if (!row) continue;
                try {
                    const data = await fetchTMDB(s.endpoint, { page: 1 });
                    row.innerHTML = '';
                    const slice = (data.results || []).filter((it) => inferMediaType(it) === 'movie' || inferMediaType(it) === 'tv').slice(0, s.preview);
                    slice.forEach((item) => {
                        const c = createCard(item);
                        if (c) row.appendChild(c);
                    });
                    row.appendChild(createShowAllBtn(s.endpoint, s.title));
                } catch (err) {
                    row.innerHTML = '<div style="color:#f44336;padding:12px;">Failed to load: ' + s.title + '</div>';
                }
            }
        }

        async function collectPagedResults(endpoint, maxPages) {
            const merged = [];
            for (let page = 1; page <= maxPages; page++) {
                const data = await fetchTMDB(endpoint, { page });
                if (!data || !data.results || !data.results.length) break;
                merged.push.apply(merged, data.results);
                const totalPages = data.total_pages || 1;
                if (page >= totalPages) break;
            }
            return merged;
        }

        async function showGrid(endpoint, title, options) {
            const opts = options || {};
            const maxPages = opts.maxPages != null ? opts.maxPages : 8;
            const isSearch = endpoint.indexOf('search/multi') === 0;

            const browseView = document.getElementById('browse-view');
            const gridPanel = document.getElementById('grid-panel');
            const gridView = document.getElementById('grid-view');
            const backBtn = document.getElementById('back-btn');
            const searchHint = document.getElementById('search-hint');

            browseView.style.display = 'none';
            gridPanel.classList.add('active');
            backBtn.classList.add('visible');
            if (searchHint) searchHint.style.display = 'none';

            document.getElementById('grid-view-title').textContent = title || 'Browse';
            document.getElementById('grid-meta').textContent = 'Loading…';

            gridView.innerHTML = '<div class="loading-wrap"><div class="loading-spinner"></div></div>';

            try {
                let results;
                if (isSearch) {
                    const first = await fetchTMDB(endpoint, { page: 1 });
                    const totalPages = Math.min(first.total_pages || 1, maxPages);
                    results = dedupeResults(first.results || []);
                    for (let page = 2; page <= totalPages; page++) {
                        const data = await fetchTMDB(endpoint, { page });
                        results = dedupeResults(results.concat(data.results || []));
                    }
                } else {
                    results = await collectPagedResults(endpoint, maxPages);
                    results = dedupeResults(results);
                }

                gridView.innerHTML = '';
                const playable = results.filter((it) => {
                    const t = inferMediaType(it);
                    return t === 'movie' || t === 'tv';
                });

                playable.forEach((item) => {
                    const c = createCard(item);
                    if (c) gridView.appendChild(c);
                });

                document.getElementById('grid-meta').textContent = playable.length + ' titles · multi-page where available';
                if (!playable.length) {
                    gridView.innerHTML = '<div class="loading-wrap" style="color:#aaa;font-weight:bold;">No results.</div>';
                    document.getElementById('grid-meta').textContent = '';
                }
            } catch (e) {
                gridView.innerHTML = '<div class="loading-wrap" style="color:#f44336;font-weight:bold;">Error: ' + (e.message || String(e)) + '</div>';
                document.getElementById('grid-meta').textContent = '';
            }

            window.scrollTo(0, 0);
        }

        function resetView() {
            document.getElementById('browse-view').style.display = 'block';
            document.getElementById('grid-panel').classList.remove('active');
            document.getElementById('back-btn').classList.remove('visible');
            document.getElementById('grid-view').innerHTML = '';
            const searchHint = document.getElementById('search-hint');
            if (searchHint) searchHint.style.display = '';
        }

        document.getElementById('back-btn').onclick = resetView;

        const searchInput = document.getElementById('media-search');
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length < 2) {
                resetView();
                return;
            }
            searchTimeout = setTimeout(() => {
                showGrid('search/multi?query=' + encodeURIComponent(query), 'Search: “' + query + '”', { maxPages: 5 });
            }, 450);
        });

        async function openPlayer(item, type) {
            const id = item.id;
            const title = item.title || item.name;
            let firstSeasonNum = 1;
            let seasonsData = [];
            if (type === 'tv') {
                try {
                    const tvInfo = await fetchTMDB('tv/' + id);
                    const seasons = (tvInfo.seasons || []).filter((s) => s.season_number > 0);
                    const pick = seasons.find((s) => (s.episode_count || 0) > 0) || seasons[0];
                    if (pick && typeof pick.season_number === 'number') firstSeasonNum = pick.season_number;
                    const sn = await fetchTMDB('tv/' + id + '/season/' + firstSeasonNum);
                    seasonsData = sn.episodes || [];
                } catch (e) {
                    seasonsData = [];
                }
            }

            const win = window.open('about:blank', '_blank');
            if (!win) return alert('Pop-up blocked!');

            const safeTitle = String(title)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/"/g, '&quot;');
            const epJson = JSON.stringify(seasonsData).replace(/</g, '\\u003c');

            const html = `<!DOCTYPE html>

  .server-head {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: #9e9e9e;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  #sidebar-server-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #server-section .src-btn {
    width: 100%;
    text-align: center;
    padding: 10px 12px;
    font-size: 13px;
  }
  #player-container {
    flex: 1;
    min-width: 0;
    min-height: 0;
    position: relative;
    background: #000;
    display: flex;
    flex-direction: column;
  }
  #main-player {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #000;
    pointer-events: auto;
  }
  .src-btn {
    background: #2a2a2a;
    border: 1px solid #555;
    color: #fff;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Space Grotesk', sans-serif;
  }
  .src-btn:hover { background: #3d3d3d; }
  .src-btn.active { border-color: #ce93d8; color: #e1bee7; background: #352040; }
  #peek-zone {
    position: fixed;
    left: 0;
    top: 0;
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: flex-start;
    padding: 12px 0 0 10px;
    pointer-events: none;
    gap: 0;
  }
  body.sidebar-collapsed #peek-zone {
    display: flex;
    pointer-events: auto;
  }
  .peek-stack {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    pointer-events: auto;
    margin-top: 50px;
  }
  .peek-ico-btn {
    opacity: 0.28;
    transform: translateX(0);
    transition: opacity 0.2s, transform 0.2s, background 0.15s;
    border: none;
    background: linear-gradient(90deg, rgba(156,39,176,0.95), rgba(106,27,154,0.85));
    color: #fff;
    width: 44px;
    height: 44px;
    border-radius: 0 12px 12px 0;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    box-shadow: 4px 4px 16px rgba(0,0,0,0.5);
    pointer-events: auto;
  }
  .peek-stack:hover .peek-ico-btn,
  .peek-ico-btn:focus {
    opacity: 1;
  }
  #peek-hint {
    margin-top: 8px;
    margin-left: 2px;
    font-size: 10px;
    color: #888;
    max-width: 70px;
    line-height: 1.25;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    font-weight: 600;
  }
  #peek-zone:hover #peek-hint { opacity: 1; }
  #empty-ep {
    padding: 16px;
    color: #888;
    font-size: 13px;
    line-height: 1.4;
  }
</style>
</head>
<body class="${type === 'tv' ? 'tv-mode' : 'movie-mode'}">
<div id="peek-zone" aria-hidden="true">
  <div class="peek-stack">
    <button type="button" class="peek-ico-btn" id="peek-open" title="Show side panel">▶</button>
  </div>
  <span id="peek-hint">Hover for panel</span>
</div>
<div id="main-row">
  <aside id="sidebar">
    <div class="sb-head">
      <span id="sb-title">${type === 'tv' ? 'Episodes' : 'Player'}</span>
      <button type="button" id="btn-collapse-sb" title="Hide sidebar">◀</button>
    </div>
    <div id="episode-wrap">
      <div id="episode-list"></div>
    </div>
    <div id="server-section">
      <div class="server-head">Servers</div>
      <div id="sidebar-server-btns">
        <button type="button" class="src-btn active" data-src="multi">MultiEmbed</button>
        <button type="button" class="src-btn" data-src="vidsrc">VidSrc</button>
        <button type="button" class="src-btn" data-src="twoembed">2Embed</button>
      </div>
    </div>
  </aside>
  <div id="player-container">
    <iframe id="main-player" title="Player" allowfullscreen
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"></iframe>
  </div>
</div>
<script>
(function(){
  const id = ${JSON.stringify(String(id))};
  const type = ${JSON.stringify(type)};
  const episodes = ${epJson};
  let currentS = ${firstSeasonNum};
  let currentE = 1;
  let currentLoader = 'multi';

  function embedUrl(loader) {
    if (loader === 'multi') {
      if (type === 'movie') return 'https://multiembed.mov/?video_id=' + encodeURIComponent(id) + '&tmdb=1';
      return 'https://multiembed.mov/?video_id=' + encodeURIComponent(id) + '&tmdb=1&s=' + currentS + '&e=' + currentE;
    }
    if (loader === 'vidsrc') {
      if (type === 'movie') return 'https://vidsrc.to/embed/movie/' + encodeURIComponent(id);
      return 'https://vidsrc.to/embed/tv/' + encodeURIComponent(id) + '/' + currentS + '/' + currentE;
    }
    if (loader === 'twoembed') {
      if (type === 'movie') return 'https://www.2embed.cc/embed/' + encodeURIComponent(id);
      return 'https://www.2embed.cc/embedtv/' + encodeURIComponent(id) + '?s=' + currentS + '&e=' + currentE;
    }
    return '';
  }

  function updatePlayer() {
    var frame = document.getElementById('main-player');
    var url = embedUrl(currentLoader);
    if (url) frame.src = url;
  }

  function setActiveBtn(loader) {
    document.querySelectorAll('.src-btn').forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-src') === loader);
    });
  }

  function onPickServer(loader) {
    currentLoader = loader;
    setActiveBtn(currentLoader);
    updatePlayer();
  }

  document.querySelectorAll('#sidebar-server-btns .src-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      onPickServer(btn.getAttribute('data-src'));
    });
  });

  function renderEpisodes() {
    var list = document.getElementById('episode-list');
    if (!list) return;
    list.innerHTML = '';
    if (!episodes.length) {
      list.innerHTML = '<div id="empty-ep">No episode list from TMDB for season ' + currentS + '. Try another server in the sidebar or pick another show.</div>';
      return;
    }
    episodes.forEach(function(ep) {
      var div = document.createElement('div');
      div.className = 'episode' + (ep.episode_number === currentE ? ' active' : '');
      div.innerHTML = '<div class="episode-num">E' + ep.episode_number + '</div>' + (ep.name || '');
      div.addEventListener('click', function() {
        currentE = ep.episode_number;
        updatePlayer();
        renderEpisodes();
      });
      list.appendChild(div);
    });
  }

  function setCollapsed(on) {
    document.body.classList.toggle('sidebar-collapsed', on);
    try { localStorage.setItem('tb_media_sb_collapsed', on ? '1' : '0'); } catch (e) {}
  }

  document.getElementById('btn-collapse-sb').addEventListener('click', function() {
    setCollapsed(true);
  });
  document.getElementById('peek-open').addEventListener('click', function() {
    setCollapsed(false);
  });

  if (type === 'tv') {
    try {
      if (localStorage.getItem('tb_media_sb_collapsed') === '1') document.body.classList.add('sidebar-collapsed');
    } catch (e) {}
    renderEpisodes();
    if (episodes.length) {
      var first = episodes[0];
      currentE = first.episode_number || 1;
    }
  } else {
    try {
      if (localStorage.getItem('tb_media_sb_collapsed') === '1') document.body.classList.add('sidebar-collapsed');
    } catch (e) {}
  }
  setActiveBtn(currentLoader);
  updatePlayer();
})();
<\/script>
</body>
</html>`;
