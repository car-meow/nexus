<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings - Nexus</title>
    <link rel="stylesheet" href="style.css?v=53">
    <style>
        body {
            margin: 0; overflow: hidden; width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
        }

        .modal-box {
            background: var(--modal-bg); padding: 24px; border-radius: 18px;
            width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
            border: 2px solid #9C27B0; text-align: center;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }
        .modal-box h2 { color: #D083DE; margin: 0 0 20px 0; font-size: 24px; }
        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--settings-row-bg); padding: 12px 18px; border-radius: 12px; border: 1px solid var(--border-color);
            margin-bottom: 12px; gap: 16px; text-align: left; flex-wrap: wrap;
        }
        .setting-label { color: var(--settings-label-color); font-size: 16px; font-weight: bold; }
        .setting-section-title {
            color: var(--settings-label-color); font-size: 19px; font-weight: 800;
            margin: 18px 0 10px; text-align: left;
        }
        .setting-label-group { display: flex; flex-direction: column; gap: 3px; }
        .setting-hint { color: var(--muted-text, #8f8f8f); font-size: 12px; font-weight: 600; }
        
        /* Toggle Switch */
        .toggle-switch {
            position: relative; width: 50px; height: 26px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #362854; transition: .3s; border-radius: 26px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #9C27B0; }
        input:checked + .slider:before { transform: translateX(24px); }

        .action-btn {
            padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
            font-weight: bold; color: #fff; font-size: 14px;
            transition: transform 0.15s, filter 0.15s;
        }
        .action-btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
        
        .custom-select {
            background: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color);
            padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
            min-width: 180px; max-width: 240px;
        }
        .custom-select:disabled { opacity: 0.65; cursor: not-allowed; }
    </style>
    <link rel="prefetch" href="index.html">
    <link rel="prefetch" href="cookie-engine.js">
    <link rel="prefetch" href="cookie-core.js">
</head>
<body class="chat-bg">
    <div id="page-fade-overlay"></div>
    <script>
        (function() {
            const overlay = document.getElementById('page-fade-overlay');
            if (overlay) {
                requestAnimationFrame(() => {
                    overlay.classList.add('fade-out');
                });
            }
            window.navigateWithFade = function(url) {
                if (overlay) {
                    overlay.classList.remove('fade-out');
                    setTimeout(() => { location.href = url; }, 370);
                } else {
                    location.href = url;
                }
            };
        })();
    </script>
    <header>
        <h1 onclick="navigateWithFade('index.html')" style="cursor:pointer">Nexus Settings</h1>
        <div class="controls">
            <button onclick="navigateWithFade('index.html')" class="material-nav-btn" style="--expanded-width: 104px;">
                <img src="Assets/media-back-arrow.svg" alt=""><span>Home</span>
            </button>
        </div>
    </header>
    <main style="display:flex; align-items:center; justify-content:center; flex:1; overflow:hidden; width:100%;">
        <div class="modal-box">
            <h2><img src="Assets/Settings.svg" alt="" style="width: 24px; height: 24px; vertical-align: middle; margin-right: 8px; filter: brightness(0) invert(1);">Settings</h2>
            
            <div class="setting-row">
                <span class="setting-label">Theme</span>
                <select id="select-theme" class="custom-select">
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>
            </div>

            <div class="setting-row">
                <span class="setting-label">Enable Cookie Game</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-cookie-game" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-row">
                <span class="setting-label">Sounds</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-mute">
                    <span class="slider"></span>
                </label>
            </div>
            

            <div class="setting-section-title">Media Settings</div>

            <div class="setting-row">
                <div class="setting-label-group">
                    <span class="setting-label">Provider</span>
                    <span class="setting-hint">Used when Auto-Select is off.</span>
                </div>
                <select id="select-media-source" class="custom-select"></select>
            </div>

            <div class="setting-row">
                <span class="setting-label">Auto-Select</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-media-auto">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-row">
                <div class="setting-label-group">
                    <span class="setting-label">Shield</span>
                    <span class="setting-hint">Blocks provider popups and redirects.</span>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-media-shield">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-row">
                <span class="setting-label">Reset Progress</span>
                <button class="material-nav-btn" style="--expanded-width: 174px;" id="btn-reset-stats">
                    <img src="Assets/Delete.svg" alt=""><span>Reset Progress</span>
                </button>
            </div>

            <div class="setting-row">
                <span class="setting-label">Reset Tutorial</span>
                <button class="material-nav-btn" style="--expanded-width: 174px;" id="btn-reset-tutorial">
                    <img src="Assets/Active Timer.svg" alt=""><span>Reset Tutorial</span>
                </button>
            </div>
        </div>
    </main>

    <script>
        // Theme
        const selectTheme = document.getElementById('select-theme');
        const savedTheme = localStorage.getItem('tb_theme') || 'dark';
        selectTheme.value = savedTheme;
        if (savedTheme === 'light') document.documentElement.classList.add('light-mode');
        
        selectTheme.addEventListener('change', (e) => {
            localStorage.setItem('tb_theme', e.target.value);
            if (e.target.value === 'light') {
                document.documentElement.classList.add('light-mode');
            } else {
                document.documentElement.classList.remove('light-mode');
            }
        });

        // Media Settings
        const MEDIA_SOURCE_KEY = 'tb_media_source';
        const OLD_MEDIA_SOURCE_KEY = 'tb_default_server';
        const MEDIA_AUTO_KEY = 'tb_media_auto_choose';
        const MEDIA_REMOVE_SHIELD_KEY = 'tb_media_remove_shield';
        const MEDIA_PROVIDERS = [
            { id: 'cinemaos', name: 'CinemaOS', quality: 98, captions: 92, reliability: 98, popupRisk: 10 },
            { id: 'vidlink', name: 'VidLink', quality: 96, captions: 92, reliability: 92, popupRisk: 16 },
            { id: 'ezvidapi', name: 'EZVidAPI', quality: 85, captions: 80, reliability: 76, popupRisk: 22 },
            { id: 'ztstream', name: 'ZTStream', quality: 85, captions: 76, reliability: 78, popupRisk: 22 },
            { id: 'autoembed', name: 'AutoEmbed', quality: 80, captions: 66, reliability: 72, popupRisk: 36 },
            { id: 'twoembed', name: '2Embed', quality: 68, captions: 48, reliability: 62, popupRisk: 64 }
        ];

        const mediaSource = document.getElementById('select-media-source');
        const mediaAuto = document.getElementById('toggle-media-auto');
        const mediaShield = document.getElementById('toggle-media-shield');

        function mediaProviderScore(provider) {
            return (provider.quality * 5) + (provider.captions * 4) + (provider.reliability * 2) - (provider.popupRisk * 1.25);
        }

        function findMediaProvider(providerId) {
            return MEDIA_PROVIDERS.find((provider) => provider.id === providerId);
        }

        function chooseBestMediaProvider() {
            return MEDIA_PROVIDERS.slice().sort((a, b) => mediaProviderScore(b) - mediaProviderScore(a))[0];
        }

        function getManualMediaProvider() {
            const saved = localStorage.getItem(MEDIA_SOURCE_KEY) || localStorage.getItem(OLD_MEDIA_SOURCE_KEY) || 'cinemaos';
            return findMediaProvider(saved) || chooseBestMediaProvider();
        }

        function saveManualMediaProvider(providerId) {
            localStorage.setItem(MEDIA_SOURCE_KEY, providerId);
            localStorage.setItem(OLD_MEDIA_SOURCE_KEY, providerId);
        }

        function renderMediaSettings() {
            const autoSelect = localStorage.getItem(MEDIA_AUTO_KEY) !== 'false';
            const shieldEnabled = localStorage.getItem(MEDIA_REMOVE_SHIELD_KEY) !== 'true';
            const manualProvider = getManualMediaProvider();
            const effectiveProvider = autoSelect ? chooseBestMediaProvider() : manualProvider;

            mediaSource.innerHTML = '';
            MEDIA_PROVIDERS.forEach((provider) => {
                const option = document.createElement('option');
                option.value = provider.id;
                option.textContent = provider.name;
                mediaSource.appendChild(option);
            });
            mediaSource.value = effectiveProvider.id;
            mediaSource.disabled = autoSelect;
            mediaAuto.checked = autoSelect;
            mediaShield.checked = shieldEnabled;
        }

        mediaSource.addEventListener('change', (e) => {
            saveManualMediaProvider(e.target.value);
            renderMediaSettings();
        });

        mediaAuto.addEventListener('change', (e) => {
            localStorage.setItem(MEDIA_AUTO_KEY, e.target.checked ? 'true' : 'false');
            const savedProvider = localStorage.getItem(MEDIA_SOURCE_KEY) || localStorage.getItem(OLD_MEDIA_SOURCE_KEY);
            if (!e.target.checked && !findMediaProvider(savedProvider)) {
                saveManualMediaProvider(chooseBestMediaProvider().id);
            }
            renderMediaSettings();
        });

        mediaShield.addEventListener('change', (e) => {
            localStorage.setItem(MEDIA_REMOVE_SHIELD_KEY, e.target.checked ? 'false' : 'true');
            renderMediaSettings();
        });

        renderMediaSettings();

        // Cookie Game Toggle
        const toggleCookie = document.getElementById('toggle-cookie-game');
        const cookieDisabled = localStorage.getItem('tb_cookie_disabled') !== 'false';
        toggleCookie.checked = !cookieDisabled;
        toggleCookie.addEventListener('change', (e) => {
            localStorage.setItem('tb_cookie_disabled', !e.target.checked);
        });

        // Sounds Toggle
        const toggleMute = document.getElementById('toggle-mute');
        function getMuted() {
            try {
                const raw = localStorage.getItem('tb_cookie_save');
                if (raw) {
                    const d = JSON.parse(raw);
                    return d.muted || false;
                }
            } catch(e) {}
            return false;
        }
        function setMuted(val) {
            try {
                const raw = localStorage.getItem('tb_cookie_save');
                let d = raw ? JSON.parse(raw) : {};
                d.muted = val;
                localStorage.setItem('tb_cookie_save', JSON.stringify(d));
            } catch(e) {}
        }
        toggleMute.checked = !getMuted();
        toggleMute.addEventListener('change', (e) => {
            setMuted(!e.target.checked);
        });

        // Reset Stats
        document.getElementById('btn-reset-stats').onclick = () => {
            if (confirm('This will erase ALL cookie game data (money, upgrades, stats, discoveries). Are you sure?')) {
                const keys = ['tb_cookie_save', 'tb_cookie_stats', 'tb_cookie_discoveries'];
                keys.forEach(k => localStorage.removeItem(k));
                alert('All cookie data has been reset!');
            }
        };

        // Reset Tutorial
        document.getElementById('btn-reset-tutorial').onclick = () => {
            localStorage.removeItem('tb_tutorial_played');
            localStorage.removeItem('tb_tutorial_skipped');
            alert('Tutorial progress has been reset!');
        };

    </script>
</body>
</html>
