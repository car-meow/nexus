<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 onclick="location.href='index.html'">Toothbrush Games</h1>
        <nav class="top-nav">
        </nav>
		
        <div id="game-status-container" class="status-header" style="display: none; margin-right: auto;">
            <div id="game-status-dot" class="status-dot"></div>
            <span id="game-status-text" style="color: white; font-weight: bold;">Loading...</span>
        </div>
		
        <div class="controls">
            <button id="bookmark-active-btn" class="save-btn rainbow-btn" style="display: none;">Bookmark</button>
            <div id="bookmark-spacer" style="width: 15px; display: none;"></div>
            <button id="cloak-btn" class="save-btn" style="background-color: #E91E63;">Fullscreen</button>
            
            <button onclick="location.href='pdf-stash.html'" class="save-btn" style="background-color: #F57C00;">Stash</button>
            <button id="export-btn" class="save-btn" style="background-color: #4CAF50;">Backup</button>
            <button onclick="document.getElementById('import-btn').click()" class="save-btn" style="background-color: #4CAF50;">Restore</button>
            <input type="file" id="import-btn" accept=".json" style="display:none">
            
            <button id="custom-app-btn" class="save-btn" style="background-color: #2196F3;">Custom</button>

            <!-- Spacer Div -->
            <div style="width: 15px;"></div>
            
            <!-- Dark Back Button -->
            <button onclick="location.href='index.html'" class="save-btn" style="background-color: #3d3d3d; border: 1px solid #444;">Back</button>
        </div>
    </header>
    <main>
        <aside class="sidebar">
            <ul id="game-list"></ul>
        </aside>
        <section class="game-container">
            <!-- The Zigzag Empty State -->
            <div id="empty-state" class="empty-state-bg">
                <h2 class="empty-state-title">Nothing Loaded.</h2>
                <p class="empty-state-subtitle">Click an app in the sidebar to get started</p>
            </div>
            
            <!-- Iframe (Hidden by default until clicked) -->
            <iframe id="game-frame" name="game-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-pointer-lock" allow="allow-storage-access-by-user-activation; storage-access; fullscreen"></iframe>
        </section>
    </main>
    <!-- Custom App Overlay -->
    <div id="custom-app-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.88); z-index: 30000; align-items: center; justify-content: center;">
        <div style="background: #1f1f1f; padding: 28px; border-radius: 16px; width: 440px; max-width: 90vw; border: 2px solid #2196F3; text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.9); font-family: 'Segoe UI', Tahoma, sans-serif;">
            <h2 style="color: #2196F3; margin-top: 0; margin-bottom: 12px; font-size: 24px;">Add Local App</h2>
            <input type="text" id="new-game-title" placeholder="App Title" style="width: 100%; padding: 12px; margin-bottom: 18px; box-sizing: border-box; border-radius: 8px; border: 1px solid #444; background: #333; color: white; font-size: 16px;">
            <input type="file" id="new-game-file" accept=".html" style="width: 100%; margin-bottom: 18px; color: white; background: #333; padding: 10px; border-radius: 8px; border: 1px solid #444;">
            <button id="add-game-btn" style="background: #4CAF50; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; transition: filter 0.2s;">Add App</button>
        </div>
    </div>

    <div id="rename-overlay" class="overlay tut-overlay">
        <div class="tut-box">
            <h2 style="color: #2196F3; margin-top: 0; margin-bottom: 12px; font-size: 24px;">Rename App</h2>
            <input type="text" id="rename-app-title" class="rename-input" placeholder="App Title">
            <button id="rename-done-btn" class="rename-done-btn">Done</button>
        </div>
    </div>

    <script src="game-title-utils.js"></script>
    <script src="app.js"></script>
    <script>
        document.getElementById('custom-app-btn').addEventListener('click', () => {
            document.getElementById('custom-app-overlay').style.display = 'flex';
            if (window.setGamePopupState) window.setGamePopupState('custom-app-overlay', true);
        });

        document.getElementById('add-game-btn').addEventListener('click', () => {
            setTimeout(() => {
                if (document.getElementById('new-game-title').value && document.getElementById('new-game-file').files.length > 0) {
                    document.getElementById('custom-app-overlay').style.display = 'none';
                    document.getElementById('new-game-title').value = '';
                    document.getElementById('new-game-file').value = '';
                    if (window.setGamePopupState) window.setGamePopupState('custom-app-overlay', false);
                }
            }, 50);
        });

        document.addEventListener('keydown', (e) => {
            const customOverlay = document.getElementById('custom-app-overlay');
            const renameOverlay = document.getElementById('rename-overlay');

            if (e.key === 'Escape') {
                if (customOverlay.style.display === 'flex') {
                    customOverlay.style.display = 'none';
                    if (window.setGamePopupState) window.setGamePopupState('custom-app-overlay', false);
                }
                if (renameOverlay && renameOverlay.style.display === 'flex') {
                    document.getElementById('rename-done-btn').dispatchEvent(new Event('rename-cancel'));
                }
            }

            if (e.key === 'Enter' && customOverlay.style.display === 'flex') {
                e.preventDefault();
                document.getElementById('add-game-btn').click();
            }
        });

        // Games Tab Tutorial Logic
        if (localStorage.getItem('tb_tutorial_active') === 'true' && !localStorage.getItem('tb_tut_games_done')) {
            setTimeout(() => {
                const cursor = document.createElement('img');
                cursor.src = 'Assets/cursor.png';
                cursor.style = 'position:fixed; z-index:40001; pointer-events:none; width:45px; animation: tutBob 1s infinite alternate; filter: drop-shadow(0 0 10px white);';
                
                const popup = document.createElement('div');
                popup.className = 'tut-box-rainbow';
                popup.style.left = '50%'; popup.style.top = '20%'; popup.style.transform = 'translateX(-50%)';
                popup.style.width = '350px';
                popup.innerHTML = `
                    <p style="color:#ccc; font-size:14px; margin:0;">
                        This is where all your games are. Click the Master Stash.
                    </p>
                `;
                
                document.body.appendChild(popup);
                document.body.appendChild(cursor);

                // Find Master Stash
                let checkStash = setInterval(() => {
                    const stashItems = Array.from(document.querySelectorAll('#game-list li')).filter(el => el.textContent.includes('Master Stash'));
                    if (stashItems.length > 0) {
                        clearInterval(checkStash);
                        const target = stashItems[0];
                        
                        const pos = () => {
                            const rect = target.getBoundingClientRect();
                            cursor.style.left = (rect.right - 20) + 'px';
                            cursor.style.top = (rect.bottom - 10) + 'px';
                        };
                        pos(); window.addEventListener('resize', pos);
                        
                        target.addEventListener('click', () => {
                            popup.innerHTML = `
                                <p style="color:#ccc; font-size:14px; margin:0;">
                                    Here, you can search for any game or scroll through the list to find one. There are over 2,700 games for you to try! Why not try one now?
                                </p>
                                <button id="close-tut-2" class="save-btn rainbow-btn" style="margin-top:10px;">Got it</button>
                            `;
                            cursor.style.display = 'none';

                            setTimeout(() => {
                                document.getElementById('close-tut-2').addEventListener('click', () => {
                                    localStorage.setItem('tb_tut_games_step2', 'true');
                                    popup.remove(); cursor.remove();
                                });
                            }, 50);
                        });
                    }
                }, 500);
            }, 500);
        }

        // Wait for game click (step 2)
        if (localStorage.getItem('tb_tutorial_active') === 'true' && !localStorage.getItem('tb_tut_games_done')) {
            const checkGameFrame = setInterval(() => {
                // Wait for them to have completed the stash click step
                if (!localStorage.getItem('tb_tut_games_step2')) return;

                const bmBtn = document.getElementById('bookmark-active-btn');
                if (bmBtn && bmBtn.style.display !== 'none' && !bmBtn.disabled) {
                    clearInterval(checkGameFrame);
                    
                    const cursor = document.createElement('img');
                    cursor.src = 'Assets/cursor.png';
                    cursor.style = 'position:fixed; z-index:40001; pointer-events:none; width:45px; animation: tutBob 1s infinite alternate; filter: drop-shadow(0 0 10px white);';
                    
                    const popup = document.createElement('div');
                    popup.className = 'tut-box-rainbow';
                    popup.style.left = '50%'; popup.style.top = '20%'; popup.style.transform = 'translateX(-50%)';
                    popup.style.width = '350px';
                    popup.innerHTML = `
                        <p style="color:#ccc; font-size:14px; margin:0;">
                            You can click the Bookmark button to add this game to the sidebar so you have easy access! There's also a Recents tab to jump right back in if you don't want to add it yourself.
                        </p>
                    `;
                    document.body.appendChild(popup);
                    document.body.appendChild(cursor);

                    const pos = () => {
                        const rect = bmBtn.getBoundingClientRect();
                        cursor.style.left = (rect.right - 10) + 'px';
                        cursor.style.top = (rect.bottom) + 'px';
                    };
                    pos(); window.addEventListener('resize', pos);

                    bmBtn.addEventListener('click', () => {
                        cursor.style.display = 'none';
                        popup.innerHTML = `
                            <p style="color:#ccc; font-size:14px; margin:0;">
                                Great! Now you have that game on speed dial. Now, do you want me to explain the functions of the icons in the top right of your screen?
                            </p>
                            <div style="margin-top:10px; display:flex; gap:10px; justify-content:center;">
                                <button id="btn-tut-no" class="save-btn" style="background:#444;">No</button>
                                <button id="btn-tut-yes" class="save-btn rainbow-btn">Yes</button>
                            </div>
                        `;

                        setTimeout(() => {
                            document.getElementById('btn-tut-no').addEventListener('click', () => {
                                popup.innerHTML = \`<p style="color:#ccc; font-size:14px; margin:0;">Okay then. Have fun!</p><button id="btn-tut-done" class="save-btn rainbow-btn" style="margin-top:10px;">Finish</button>\`;
                                document.getElementById('btn-tut-done').onclick = () => { localStorage.setItem('tb_tut_games_done', 'true'); popup.remove(); cursor.remove(); };
                            });

                            document.getElementById('btn-tut-yes').addEventListener('click', () => {
                                popup.style.width = '500px';
                                popup.innerHTML = \`
                                    <p style="color:#ccc; font-size:13px; margin:0; line-height:1.5;">
                                        Alright. The <b>Fullscreen</b> icon opens the currently loaded game into a fullscreen and cloaked new tab. The <b>Stash</b> icon is in case you want to see the game files themselves. The <b>Backup</b> and <b>Restore</b> buttons let you backup and restore your progress (loaded onto a .json file that you can save) across devices or if you're paranoid. And the <b>Custom</b> button allows you to load any other html file that isn't in the Master Stash for some reason!
                                    </p>
                                    <button id="btn-tut-done" class="save-btn rainbow-btn" style="margin-top:15px;">Finish</button>
                                \`;
                                document.getElementById('btn-tut-done').onclick = () => { localStorage.setItem('tb_tut_games_done', 'true'); popup.remove(); cursor.remove(); };
                            });
                        }, 50);
                    });
                }
            }, 1000);
        }
    </script>
</body>
</html>
